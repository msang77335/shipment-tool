version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shipment-tool
    restart: unless-stopped
    networks:
      network1:
    ports:
      - "${PORT:-9066}:9066"
    environment:
      - NODE_ENV=production
      - PORT=9066
      - API_PREFIX=${API_PREFIX:-/api/v1}
      - TRUST_PROXY=${TRUST_PROXY:-loopback, linklocal, uniquelocal}
      # Captcha Services
      - CAPTCHA_SOLVER_API_KEY=${CAPTCHA_SOLVER_API_KEY:-}
      # Google AI
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Browserless
      - BROWSERLESS_API_TOKEN=${BROWSERLESS_API_TOKEN:-}
      # Api key for accessing the API
      - X_API_KEY=${X_API_KEY:-}
      # Proxy list for browser contexts
      - PROXY_LIST=${PROXY_LIST:-}
      # Webshare API key for proxy management
      - WEBSHARE_API_KEY=${WEBSHARE_API_KEY:-}
    healthcheck:
      # Simple health check that calls the API endpoint to refresh the proxy blacklist
      test: ["CMD", "curl", "-f", "-X", "POST", "-H", "x-api-key: ${X_API_KEY}", "http://localhost:9066/api/v1/proxy/replace-blacklist-proxies"]
      interval: 300s
      timeout: 10s
      start_period: 60s
networks:
  automation-net:
    driver: bridge
  network1:
    name: dokploy-network
    external: true